# CI for the Foundry substrate and product domains: install the
# package with the dev extra and run the full pytest suite on every
# supported Python line. Web tests importorskip fastapi and simply
# skip here — the core suite must stay runnable in a zero-dependency
# environment (see pyproject.toml's dependencies = []).
name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Test
        run: python -m pytest tests -q
